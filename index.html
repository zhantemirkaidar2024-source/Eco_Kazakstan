<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Education System PRO v6.0</title>
    <script>
        // Eco-Education System JavaScript Implementation
        const moduleData = [
            { title: 'Module 1: Introduction to Kazakhstan Ecology', content: 'Details about the Kazakhstan ecology...' },
            { title: 'Module 2: Flora and Fauna', content: 'Information about plants and animals...' },
            { title: 'Module 3: Environmental Issues', content: 'Discussion on current environmental problems...' },
            { title: 'Module 4: Conservation Efforts', content: 'Overview of conservation projects...' },
            { title: 'Module 5: Sustainable Practices', content: 'Guide on sustainable living...' },
            { title: 'Module 6: Interactive Features', content: 'Engaging activities and assessments...' }
        ];

        // Function to display modules
        function displayModules() {
            const moduleContainer = document.getElementById('modules');
            moduleData.forEach(module => {
                const moduleElement = document.createElement('div');
                moduleElement.innerHTML = `<h2>${module.title}</h2><p>${module.content}</p>`;
                moduleContainer.appendChild(moduleElement);
            });
        }

        // Function to save progress in localStorage
        function saveProgress(moduleIndex) {
            localStorage.setItem(`module${moduleIndex}`, 'completed');
        }

        window.onload = () => {
            displayModules();
        };
    </script>
</head>
<body>
    <h1>Welcome to the Eco-Education System PRO v6.0</h1>
    <div id="modules"></div>
    <footer>
        <button onclick="saveProgress(1)">Complete Module 1</button>
        <button onclick="saveProgress(2)">Complete Module 2</button>
        <button onclick="saveProgress(3)">Complete Module 3</button>
        <button onclick="saveProgress(4)">Complete Module 4</button>
        <button onclick="saveProgress(5)">Complete Module 5</button>
        <button onclick="saveProgress(6)">Complete Module 6</button>
    </footer>
</body>
</html>
